version: "3.9"

services:
  shap-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: shap-api
    image: shap-api:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount model bundle (opsional – override yang ada di image)
      - ./fertilizer_shap_bundle.pkl:/app/fertilizer_shap_bundle.pkl:ro
      # Mount Firebase service account JSON (jika ada)
      # - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
